name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest)
        run: pytest -q

  frontend:
    name: Frontend — lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DELIVERY_MODE: job
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm run test

      - name: Build (next build)
        run: npm run build

      # upload-artifact skips .gitignore'd paths; .next is ignored, so tar first.
      - name: Package frontend build
        run: tar -czf ../frontend-next.tar.gz .next

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next-build
          path: frontend-next.tar.gz
          retention-days: 14
          if-no-files-found: error

  e2e:
    name: E2E — Playwright
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_DELIVERY_MODE: job
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        run: npm run e2e

  release:
    name: Release — zip artifacts
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-next-build
          path: .

      - name: Extract frontend build
        run: |
          mkdir -p frontend
          tar -xzf frontend-next.tar.gz -C frontend

      - name: Zip build artifacts
        run: |
          mkdir -p dist
          (cd frontend && zip -r ../dist/frontend-next.zip .next)
          zip -r dist/backend.zip backend/app backend/requirements.txt render.yaml

      - name: Upload release bundle (Actions artifact)
        uses: actions/upload-artifact@v4
        with:
          name: gc-downloader-release-${{ github.sha }}
          path: dist/
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: GC Downloader build ${{ github.run_number }}
          body: |
            Automated release from CI on `${{ github.sha }}`.

            **Artifacts**
            - `frontend-next.zip` — production Next.js build output
            - `backend.zip` — backend application source bundle

            Deploy the frontend to Vercel and the backend to Render (see README).
          files: dist/*
          generate_release_notes: true
