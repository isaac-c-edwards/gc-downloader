services:
  - type: web
    name: gc-downloader-api
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DELIVERY_MODE
        value: job
      - key: MAX_CONCURRENCY
        value: "12"
      - key: MAX_CONCURRENT_JOBS
        value: "3"
      - key: MAX_QUEUED_JOBS
        value: "20"
      - key: PER_JOB_CONCURRENCY
        value: "4"
      - key: CATALOG_CACHE_MAXSIZE
        value: "64"
      - key: CORS_ORIGINS
        # Set to your Vercel frontend URL, e.g. https://gc-downloader.vercel.app
        sync: false
      - key: HTTP_USER_AGENT
        sync: false
    autoDeploy: true
